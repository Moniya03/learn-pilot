server {
    listen 80;

    # Root path → login UI (rewrite to /ui/v2/login/)
    location = / {
        proxy_pass http://zitadel-login:3000/ui/v2/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Login UI (Next.js app)
    location /ui/v2/login {
        proxy_pass http://zitadel-login:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Everything else → Zitadel API via gRPC (HTTP/2 cleartext)
    # Zitadel serves both gRPC and HTTP on the same port, both need HTTP/2
    location / {
        grpc_pass grpc://zitadel-api:8080;
        grpc_set_header Host $host;
        grpc_set_header X-Forwarded-Proto http;
    }
}
