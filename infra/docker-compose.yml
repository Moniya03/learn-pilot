# LearnPilot infrastructure - local dev
# Ports exposed to host:
#   - 8080: KrakenD gateway (public)
#   - 80: Zitadel console (localhost only, dev)
#   - 5552: RabbitMQ management UI (localhost only, dev)
#   - 9001: MinIO console (localhost only, dev)
# All services are on learnpilot_private network.

services:
  # ── Postgres: shared instance, two databases ──
  postgres:
    image: postgres:16
    container_name: learnpilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learnpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnpilot}
      POSTGRES_DB: learnpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-zitadel-db.sh:/docker-entrypoint-initdb.d/01-init-zitadel-db.sh:ro
    networks:
      - learnpilot_private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnpilot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Zitadel API: identity provider backend ──
  zitadel-api:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: learnpilot_zitadel_api
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_DATABASE_POSTGRES_DSN: postgresql://${POSTGRES_USER:-learnpilot}:${POSTGRES_PASSWORD:-learnpilot}@postgres:5432/zitadel?sslmode=disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-zitadel-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-Password1!}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_NAME: LearnPilot
      ZITADEL_PORT: "8080"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "80"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_LOG_LEVEL: info
      # Login v2 — separate login UI container
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost/ui/v2/login/login?samlRequest=
      # Login client (machine user for login UI to talk to API)
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION:-2099-01-01T00:00:00Z}
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:rw
    networks:
      - learnpilot_private

  # ── Zitadel Login v2: Next.js login UI ──
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:latest
    container_name: learnpilot_zitadel_login
    restart: unless-stopped
    user: "0"
    depends_on:
      zitadel-api:
        condition: service_healthy
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    healthcheck:
      test: ["CMD-SHELL", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:ro
    networks:
      - learnpilot_private

  # ── Zitadel proxy: nginx routing for API + Login on :8081 ──
  zitadel-proxy:
    image: nginx:alpine
    container_name: learnpilot_zitadel_proxy
    restart: unless-stopped
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./zitadel/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - learnpilot_private

  # ── KrakenD: API gateway ──
  krakend:
    image: krakend:latest
    container_name: learnpilot_krakend
    restart: unless-stopped
    depends_on:
      - zitadel-api
    ports:
      - "8080:8080"
    volumes:
      - ../gateway/krakend.json:/etc/krakend/krakend.json:ro
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    networks:
      - learnpilot_private

  # ── RabbitMQ: message broker ──
  rabbitmq:
    image: rabbitmq:3-management
    container_name: learnpilot_rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5552:15672"  # management UI, localhost only
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-learnpilot}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-learnpilot}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - learnpilot_private
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Weaviate: vector store ──
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: learnpilot_weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      ENABLE_MODULES: ""
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - learnpilot_private

  # ── MinIO: object storage ──
  minio:
    image: minio/minio
    container_name: learnpilot_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9001:9001"  # console, localhost only
      - "127.0.0.1:9000:9000"  # API, localhost only (services use internal network)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - learnpilot_private

  # ── identity-service: owns User profile keyed by Zitadel sub ──
  identity-service:
    build:
      context: ..   # repo root so Dockerfile can COPY shared/
      dockerfile: services/identity/Dockerfile
    container_name: learnpilot_identity
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-learnpilot}:${POSTGRES_PASSWORD:-learnpilot}@postgres:5432/learnpilot
      DB_SCHEMA: identity
    networks:
      - learnpilot_private

  # Stub services re-added as their services/<name>/ Dockerfiles land.

networks:
  learnpilot_private:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  weaviate_data:
  minio_data:
  zitadel_bootstrap:
